services:
  chanchito:
    build: .
    ports: 
      - "3000:3000"
  monguito:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=julio
      - MONGO_INITDB_ROOT_PASSWORD=contra123
    volumes:
      - mongo-data:/data/db
      # mysql -> /var/lib/mysql
      # postgres -> /var/lib/postgresql/data

volumes:
  mongo-data: 